<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#171918">
    <title>Page not found | Product Security Desk</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="shortcut icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <style>
      body { min-height: 100svh; color: #fff; background: var(--ink); }
      .not-found { display: grid; min-height: 100svh; place-items: center; padding: 32px 0; }
      .not-found-copy { max-width: 720px; text-align: center; }
      .not-found h1 { margin-bottom: 20px; font-size: 64px; }
      .not-found p:not(.eyebrow) { margin-bottom: 32px; color: rgba(255, 255, 255, 0.7); font-size: 18px; }
      @media (max-width: 700px) { .not-found h1 { font-size: 42px; } }
    </style>
  </head>
  <body>
    <main class="not-found">
      <div class="shell not-found-copy">
        <p class="eyebrow eyebrow-light">404</p>
        <h1>This page is not part of the sprint.</h1>
        <p>The address may have changed or the link may be incomplete.</p>
        <a class="button button-primary" href="/">Return to Product Security Desk</a>
      </div>
    </main>
  </body>
</html>
